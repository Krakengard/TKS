spring.application.name=Rental


server.port=8081


jwt.secret=mySuperSecretKeyForJWTGenerationThatIsAtLeast256BitsLong
jwt.expiration=86400000


jws.secret=mySuperSecretKeyForJWSGenerationThatIsAtLeast256BitsLong


cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

logging.level.org.springframework.security=DEBUG
logging.level.org.example.rental=DEBUG  
logging.level.org.hibernate=DEBUG        